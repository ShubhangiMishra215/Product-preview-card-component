<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="index.css">
  <title>Frontend Mentor | Product preview card component</title>

  
  
</head>
<body>
  <main>
    <div class="card-container">
    <div class="card">
      <picture class="card-image">
        <source media="(min-width: 90rem)" srcset="images/image-product-desktop.jpg">
        <img src="images/image-product-mobile.jpg" alt="Product image" class="product-img"/>
      </picture>

      <div class="card-text">
        <div class="product_name"> Perfume</div>
        <h1 class="card-title">Gabrielle Essence Eau De Parfum</h1>
        <div class="card-description">
          A floral, solar and voluptuous interpretation composed by Olivier Polge, 
          Perfumer-Creator for the House of CHANEL.
        </div>
        <div class="price">
          <div class="newprice">$149.99</div>
          <div class="oldprice"><s> $169.99 </s></div>
        </div>
        
        <div class="card-button">
          <div class="card-button-image">
            <img src="images/icon-cart.svg" alt="cart-icon"/>
          </div>
          <div class="card-button-text">Add to Cart </div>
        </div>  
      </div>
      
    </div>
  </div>
  </main>

  <footer>
    <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Shubhangi Mishra</a>.
  </div>
  </footer>  
  
</body>
</html>
